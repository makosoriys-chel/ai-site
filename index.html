<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    textarea {
      width: 100%;
      height: 150px;

      background: #1e293b;
      color: white;

      border: none;
      border-radius: 12px;

      padding: 15px;
      font-size: 16px;

      resize: none;
    }

    button {
      margin-top: 15px;

      width: 100%;
      padding: 15px;

      border: none;
      border-radius: 12px;

      background: #3b82f6;
      color: white;

      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #response {
      margin-top: 20px;

      background: #1e293b;

      padding: 20px;
      border-radius: 12px;

      min-height: 120px;

      white-space: pre-wrap;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>AI Assistant</h1>

    <p>
      Напишите сообщение и получите ответ от нейросети
    </p>

    <textarea
      id="userInput"
      placeholder="Введите сообщение..."
    ></textarea>

    <button onclick="sendMessage()">
      Отправить
    </button>

    <div id="response">
      Здесь появится ответ...
    </div>

  </div>

  <script>

    async function sendMessage() {

      const input =
        document.getElementById("userInput").value;

      const responseBlock =
        document.getElementById("response");

      responseBlock.innerText = "Загрузка...";

      try {

        const response = await fetch(
          "/api/chat",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              message: input
            })
          }
        );

        const data = await response.json();

        responseBlock.innerText = data.answer;

      } catch (error) {

        responseBlock.innerText =
          "Ошибка подключения";

      }

    }

  </script>

</body>
</html>
